model = "gpt-5.5"
model_reasoning_effort = "high"
notify = ["bash", "-lc", "afplay /System/Library/Sounds/Submarine.aiff"] # Ping, Glass
check_for_update_on_startup = false
web_search = "live"
suppress_unstable_features_warning = true
sandbox_mode = "workspace-write"
approval_policy = "never"
personality = "pragmatic"

[features]
unified_exec = true
shell_snapshot = true
steer = true
personality = true
apps = false
js_repl = true
prevent_idle_sleep = true

[feedback]
enabled = false

[sandbox_workspace_write]
network_access = true
writable_roots = ["/Users/tom/dev"]

[tui]
theme = "catppuccin-macchiato"
show_tooltips = false
status_line = ["context-remaining", "used-tokens", "total-input-tokens", "total-output-tokens", "run-state", "fast-mode"]
status_line_use_colors = false

[notice]
fast_default_opt_out = true

