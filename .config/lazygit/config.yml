gui:
  theme:
    activeBorderColor:
      - '#c6a0f6'
      - bold
    inactiveBorderColor:
      - '#a5adcb'
    optionsTextColor:
      - '#8aadf4'
    selectedLineBgColor:
      - '#363a4f'
    cherryPickedCommitBgColor:
      - '#494d64'
    cherryPickedCommitFgColor:
      - '#c6a0f6'
    unstagedChangesColor:
      - '#ed8796'
    defaultFgColor:
      - '#cad3f5'
    searchingActiveBorderColor:
      - '#eed49f'
  authorColors:
    '*': '#b7bdf8'
  sidePanelWidth: 0.2
  commandLogSize: 2
  showRandomTip: false
  nerdFontsVersion: "3"
  showFileIcons: false
  sidePanels:
    - [files, worktrees]
    - [branches, tags]
    - [commits]
    - [stash]
git:
  log:
    order: default
  branchLogCmd: git log --graph --color=always --abbrev-commit --decorate --date=relative {{branchName}} -- # default command but without `--pretty=medium` to inherit my ~/.gitconfig setting
  autoFetch: false
  overrideGpg: true
  pagers:
    - pager: delta --side-by-side --dark --paging=never --features=catppuccin-macchiato
  diffContextSize: 2
os:
  # Same as the default but using --remote instead of --remote-tab to reuse the same tab
  edit: '[ -z "$NVIM" ] && (nvim -- {{filename}}) || (nvim --server "$NVIM" --remote-send "<C-\\><C-n>q" && nvim --server "$NVIM" --remote {{filename}})'
  editAtLine: '[ -z "$NVIM" ] && (nvim +{{line}} -- {{filename}}) || (nvim --server "$NVIM" --remote-send "<C-\\><C-n>q" && nvim --server "$NVIM" --remote {{filename}} && nvim --server "$NVIM" --remote-send ":{{line}}<CR>")'
promptToReturnFromSubprocess: false
notARepository: skip
