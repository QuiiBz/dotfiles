schema_version = 1
snapzy_min_version = "1.25.2"

[general]
language = "en"
appearance = "system"
play_sounds = true
start_at_login = true
export_location = "~/Desktop/Snapzy"

[updates]
check_automatically = true
download_automatically = true

[diagnostics]
enabled = false
retention_days = 3

[capture]
hide_desktop_icons = false
hide_desktop_widgets = false

[capture.naming]
screenshot_template = "{datetime}_{ms}"
recording_template = "Recording_{datetime}"

[capture.screenshot]
format = "png"
include_snapzy = false
show_cursor = false

[capture.scrolling]
show_hints = true

[capture.ocr]
success_notification = false

[capture.object_cutout]
auto_crop = false

[capture.after.screenshot]
save = true
quick_access = true
copy_file = true
open_annotate = false
upload_to_cloud = false

[capture.after.recording]
save = true
quick_access = true
copy_file = true
open_annotate = false
upload_to_cloud = false

[recording]
format = "mov"
quality = "high"
fps = 30
output_mode = "video"
capture_system_audio = true
capture_microphone = false
microphone_device_id = "system-default"
remember_last_area = true
include_snapzy = false
show_cursor = true
highlight_clicks = false
show_keystrokes = false

[recording.mouse_highlight]
size = 50.0
animation_duration = 0.7
color = "#003AFF"
opacity = 0.5
ripple_count = 3

[recording.keystrokes]
font_size = 16.0
position = "bottomCenter"
display_duration = 1.5

[recording.annotation_shortcuts]
modifier = "shift"
hold_duration = 0.3

[quick_access]
enabled = true
position = "bottomRight"
auto_dismiss = false
auto_dismiss_delay = 10.0
pause_countdown_on_hover = true
overlay_scale = 1.5
drag_drop = true
two_finger_swipe_to_dismiss = true
swipe_sensitivity = 1.0
actions_order = ["copy", "saveOrOpen", "dismiss", "delete", "edit", "uploadToCloud", "pinToScreen"]
enabled_actions = ["copy", "delete", "dismiss", "edit", "pinToScreen", "saveOrOpen"]

[quick_access.slots]
center_top = "copy"
center_bottom = "edit"
top_trailing = "dismiss"
top_leading = "delete"
bottom_leading = "saveOrOpen"
bottom_trailing = "pinToScreen"

[history]
enabled = true
retention_days = 30
max_count = 500
background_style = "hud"
open_on_launch = false

[history.floating]
enabled = true
position = "topCenter"
default_filter = "all"
max_displayed_items = 10
scale = 1.0
auto_clear_days = 0

[cloud]
provider = "aws_s3"
bucket = ""
region = "us-east-1"
endpoint = ""
custom_domain = ""
expire_time = "7d"
uploads_window_position = "center"

[annotate]
clipboard_image_open_behavior = "ask"
close_after_drag = true
bring_forward_after_drag = false
quick_properties_sync = true

[shortcuts]
enabled = true

[shortcuts.global.fullscreen]
enabled = true
key = "3"
modifiers = ["command", "shift"]

[shortcuts.global.area]
enabled = true
key = "4"
modifiers = ["command", "shift"]

[shortcuts.global.area_annotate]
enabled = false
key = "7"
modifiers = ["command", "shift"]

[shortcuts.global.active_window]
enabled = true
key = "9"
modifiers = ["command", "shift"]

[shortcuts.global.scrolling_capture]
enabled = false
key = "6"
modifiers = ["command", "shift"]

[shortcuts.global.recording]
enabled = true
key = "5"
modifiers = ["command", "shift"]

[shortcuts.global.pause_resume_recording]
enabled = true
key = ""
modifiers = []

[shortcuts.global.toggle_pen_recording]
enabled = true
key = ""
modifiers = []

[shortcuts.global.restart_recording]
enabled = true
key = ""
modifiers = []

[shortcuts.global.delete_recording]
enabled = true
key = ""
modifiers = []

[shortcuts.global.annotate]
