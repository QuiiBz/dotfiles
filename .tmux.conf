# Start window and pane numbering from 1 for easier switching
set -g base-index 1
setw -g pane-base-index 1

# Set pane name to current working directory
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_command}'

# Refresh status line every 2s
set-option -g status-interval 2

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Don't strip key modifiers from escape sequences
set -g extended-keys on
set -g extended-keys-format csi-u

# Renumber windows when one is removed.
set -g renumber-windows on

# Enable focus events
set -g focus-events on

# Improve colors
set -g default-terminal "${TERM}"
set -as terminal-features ",*:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"

# Allow passthrough of escape sequences to the terminal
set -g allow-passthrough on

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# Support colors for undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Use same selection color as nvim
set -g mode-style fg=default,bg=#494d64

# Allow the mouse to resize windows and select tabs
set -g mouse on

# Use Ctrl+A for prefix instead of Ctrl+B
set -g prefix C-a

# 'PREFIX r' to reload of the config file
unbind r
bind r source-file ~/.tmux.conf\; display-message '~/.tmux.conf reloaded'

# Fix very annoying issue when scrolling a buffer and trying to select some text: by default it will scroll back down
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "reattach-to-user-namespace pbcopy" \; send -X clear-selection

# Keep copy mode open after double/triple click selection.
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"

# Enable vi mode in copy mode
setw -g mode-keys vi

# Use incremental search in copy mode
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

# Start selection with v in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy selecting with y in copy mode
bind-key -T copy-mode-vi y send -X copy-selection

# Exit copy mode with esc
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Status line customisation
set-option -g status-left-length 100
set-option -g status-right-length 160
set-option -g status-left "#{?client_prefix,#[fg=#C6A0F6]#[bold],#[fg=#5b6078]} ▲ #{session_name}#[default]   "
set-option -g status-right "#[fg=#eed49f,bold]#(tmux show-environment -g PANE_#{pane_id}_AWS_PROFILE 2>/dev/null | cut -d= -f2 | awk '{if(NF) print \"   \" $0}')#[fg=#8aadf4,bold]#(kubectl config current-context 2>/dev/null | awk '{if(NF) print \"    \" $0}') "
set-option -g status-format[0] '#[align=left]#{T:status-left}#{W:#[range=window|#{window_index}]#[fg=#5b6078]#{T:window-status-format}#[norange],#[range=window|#{window_index}]#[fg=#C6A0F6,bold]#{T:window-status-current-format}#[norange]}#[default align=centre]#(~/.tmux/agent-status.sh)#[align=right]#{T:status-right}'
set-option -g status-style "fg=#5b6078 bg=default"
set-option -g window-status-format "#{window_name} (#{window_index})   "
set-option -g window-status-current-format "#{window_name}#{?window_zoomed_flag,*,} (#{window_index})   "
set-option -g window-status-current-style "fg=#C6A0F6,bold bg=default"
set-option -g window-status-activity-style none
set-option -g pane-border-style "fg=#5b6078 bg=default"
set-option -g pane-active-border-style "fg=#C6A0F6 bg=default"
set-option -g default-shell /bin/zsh

# Quickly go to the previous window with ctrl+tab. Either next or last window depending on the current one
bind tab last-window

# Quickly go to to previous session with ctrl+shift+tab
bind btab switch-client -l

# Move between panes using vim movement keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with ctrl+vim movement keys
bind -r C-h resize-pane -L 1
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1

# Bind back ctrl+a & ctrl+b (move cursor to start/end of line), as ctrl is used for prefix
bind-key a send-keys C-a
bind-key e send-keys C-e

# Open new panes in the current pane's directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Scroll line by line in copy mode
bind -Tcopy-mode-vi WheelUpPane send -N1 -X scroll-up
bind -Tcopy-mode-vi WheelDownPane send -N1 -X scroll-down

# Scrollback history to 10k lines
set-option -g history-limit 10000

# Automatically restore tmux environment after a system restart
set -g @continuum-restore 'on'
set -g @resurrect-processes 'false'
set -g @resurrect-dir '~/.tmux/resurrect'

run-shell ~/.tmux/plugins/resurrect/resurrect.tmux
run-shell ~/.tmux/plugins/continuum/continuum.tmux
