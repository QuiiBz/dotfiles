[bootstrap.macos.dock]
autohide = true
tilesize = 42
magnification = true
show_recents = false

[bootstrap.macos.finder]
# show_all_files = true
show_pathbar = true
show_status_bar = false
show_extensions_warning = false
preferred_view_style = "list"

[bootstrap.macos.keyboard]
initial_key_repeat = 15
key_repeat = 1

[bootstrap.macos.trackpad]
tap_to_click = true

[bootstrap.macos.defaults]
# Show thumbnail preview for 60s when taking screenshots
"com.apple.screencaptureui" = { "thumbnailExpiration" = 60.0 }
# Enable "Group windows by application"
"com.apple.dock" = { "expose-group-apps" = true }
# Disable "Displays have separate Spaces"
"com.apple.spaces" = { "spans-displays" = true }
"NSGlobalDomain" = {
  # Disable Windows opening animations
  "NSAutomaticWindowAnimationsEnabled" = false,
  "InitialKeyRepeat" = 15.0,
  # Remove many icons in right click menu
  "NSMenuEnableActionImages" = false,
  # Allow draging any part of a window with cmd+ctrl
  "NSWindowShouldDragOnGesture" = true,
}

[bootstrap.user]
login_shell = "/bin/zsh"

[bootstrap.hooks.final]
run = []

[tasks.init]
description = "Initial setup for a new machine"
run = [
  # Misc
  "mkdir -p ~/.tmux/plugins",
  "git lfs install",
  "git clone https://github.com/tmux-plugins/tmux-resurrect ~/.tmux/plugins/resurrect",
  "git clone https://github.com/tmux-plugins/tmux-continuum ~/.tmux/plugins/continuum",
  # GitHub
  "gh auth login",
  # Neovim
  "sudo bob install nightly",
  "sudo bob use nightly",
  # Xcode
  "sudo xcode-select --install || true",
  "sudo xcodebuild -license accept",
  "sudo xcodebuild -runFirstLaunch",
]

[tasks.sync]
description = "Sync dotfiles and update tools"
run = [
  # Dotfiles
  "cd ~/dev/dotfiles && git pull --rebase",
  "mise bootstrap --yes --force-dotfiles",
  "mise upgrade",
  "mise prune --yes",
  # Brew
  "brew update",
  "brew upgrade --yes",
  "brew cleanup",
  # Misc
  "tldr --update",
  "bat cache --build",
  # Pnpm
  "pnpm store prune",
  # Cargo
  "sudo cargo clean-all --yes",
  # Neovim
  "sudo env GITHUB_TOKEN=\"$(gh auth token)\" bob update",
  "nvim --headless '+Lazy! sync' +qa",
]

[dotfiles]
"~/.config/mise/config.toml" = "~/dev/dotfiles/mise/config.toml"
"~/.zshrc" = {}
"~/.bashrc" = {}
"~/.gitconfig" = {}
"~/.tmux.conf" = {}
"~/.hushlogin" = {}
"~/.nirc" = {}
"~/.wezterm.lua" = {}
"~/.config" = { mode = "symlink-each" }
"~/.kube" = { mode = "symlink-each" }
"~/.codex" = { mode = "symlink-each" }
"~/.pi/agent" = { mode = "symlink-each" }
"~/.tmux" = { mode = "symlink-each" }
"~/.agents/.skill-lock.json" = {}
# Codex doesn't load symlinked SKILL.md files, only their parent directories: https://github.com/openai/codex/issues/11314
"~/.agents/skills/*" = "~/dev/dotfiles/.agents/skills/*"
"/etc/hosts/alpha" = { line = "192.168.0.81 alpha"}
"/etc/hosts/nas" = { line = "192.168.0.84 nas"}

[settings]
color_theme = "catppuccin"
idiomatic_version_file_enable_tools = ["node", "bun", "deno", "go", "npm", "pnpm", "rust", "terraform"]

[settings.dotfiles]
root = "~/dev/dotfiles"
default_mode = "symlink"

[settings.npm]
package_manager = "pnpm"

